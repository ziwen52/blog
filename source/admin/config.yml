    slug: "{{slug}}"
    preview_path: "{{slug}}"
    sortable_fields: ["date", "title"]
    view_filters:
      - label: "е®ёжҸ’еҪӮз”Ҝ?
        field: "draft"
        pattern: false
    view_groups:
      - label: "йҚ’е—ҷиў«"
        field: categories
    fields:
      - {label: "йҸҚеӣ¬о•Ҫ", name: "title", widget: "string"}
      - {label: "йҚҷжҲқз«·йҸғгғҰж№Ў", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss"}
      - {label: "йҚ’е—ҷиў«", name: "categories", widget: "list", required: false, allow_add: true}
      - {label: "йҸҚеӣ©о„·", name: "tags", widget: "list", required: false, allow_add: true}
      - {label: "е§қпҪҶжһғ", name: "body", widget: "markdown"}
